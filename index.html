<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0"/>
  <title>VIRES – Hệ Thống Quản Lý Vật Tư</title>
  <meta name="description" content="Hệ thống quản lý vật tư văn phòng phẩm nội bộ Trung tâm VIRES.">
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark:  #0d3320;
      --green-main:  #1a5c36;
      --green-mid:   #2d8653;
      --green-light: #4db87a;
      --gold:        #c9a227;
      --bg:          #f0f4f0;
      --white:       #ffffff;
    }
    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      overflow: hidden;
    }
    /* ── Background canvas ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    /* ── Glassmorphism card ── */
    .card {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 20px;
    }
    .glass {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 28px;
      box-shadow: 0 32px 64px rgba(13,51,32,0.18), 0 0 0 1px rgba(255,255,255,0.3) inset;
      padding: 52px 56px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    /* ── Logo ring ── */
    .logo-wrap {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 28px;
    }
    .logo-wrap img {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: contain;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 8px 24px rgba(13,51,32,0.2);
    }
    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--green-main);
      border-right-color: var(--green-light);
      animation: spin 1.6s linear infinite;
    }
    .ring.ring2 {
      inset: 6px;
      border-top-color: transparent;
      border-bottom-color: var(--gold);
      border-left-color: var(--gold);
      animation-direction: reverse;
      animation-duration: 2.4s;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ── Text ── */
    .org {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--green-mid);
      margin-bottom: 8px;
    }
    h1 {
      font-size: 26px;
      font-weight: 800;
      color: var(--green-dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 14px;
      color: #5a7a65;
      font-weight: 400;
      margin-bottom: 36px;
      line-height: 1.6;
    }
    /* ── Progress bar ── */
    .progress-wrap {
      width: 100%;
      height: 5px;
      background: rgba(13,51,32,0.1);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--green-main), var(--green-light), var(--gold));
      background-size: 200% 100%;
      animation: fillBar 2.4s cubic-bezier(0.4,0,0.2,1) forwards,
                 shimmer 1.5s linear infinite;
    }
    @keyframes fillBar  { to { width: 100%; } }
    @keyframes shimmer  { to { background-position: -200% 0; } }
    .status-text {
      font-size: 13px;
      color: #7a9a82;
      font-weight: 500;
      letter-spacing: 0.3px;
      min-height: 20px;
      transition: opacity 0.3s;
    }
    /* ── CTA Button (shown as fallback) ── */
    .btn-open {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 32px;
      padding: 16px 36px;
      background: linear-gradient(135deg, var(--green-main) 0%, var(--green-dark) 100%);
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      box-shadow: 0 8px 24px rgba(13,51,32,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      opacity: 0;
      pointer-events: none;
      animation: fadeInBtn 0.5s ease 2.5s forwards;
    }
    @keyframes fadeInBtn { to { opacity: 1; pointer-events: auto; } }
    .btn-open:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(13,51,32,0.38);
    }
    .btn-open svg { flex-shrink: 0; }
    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 18px;
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      color: rgba(13,51,32,0.45);
      z-index: 10;
      letter-spacing: 0.5px;
    }
    /* ── Responsive ── */
    @media (max-width: 480px) {
      .glass { padding: 40px 28px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="card">
    <div class="glass">
      <div class="logo-wrap">
        <div class="ring"></div>
        <div class="ring ring2"></div>
        <img src="logo.png" alt="VIRES Logo" onerror="this.style.display='none'">
      </div>
      <p class="org">Trung Tâm VIRES</p>
      <h1>Hệ Thống Quản Lý<br>Vật Tư – VPP</h1>
      <p class="subtitle">Đang kết nối và khởi tạo hệ thống,<br>vui lòng chờ trong giây lát…</p>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p class="status-text" id="statusText">Đang xác thực kết nối…</p>
      <a id="btnOpen"
         class="btn-open"
         href="https://script.google.com/macros/s/AKfycbw2JpnKyd3gXzG0qKN11wSxtzBnJO-s600jg12JgmByuNk1pqmJiz_TeAFzw0yn2Qrj/exec"
         target="_self">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h6v6M10 14 21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        </svg>
        Mở Hệ Thống Ngay
      </a>
    </div>
  </div>
  <div class="footer">© 2025 Trung Tâm VIRES &nbsp;|&nbsp; Quản Lý Vật Tư Nội Bộ</div>
  <script>
    /* ── Animated particle background ── */
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];
      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      function Particle() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.r = Math.random() * 3 + 1;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.alpha = Math.random() * 0.5 + 0.1;
        this.color = Math.random() > 0.5 ? '#2d8653' : '#c9a227';
      }
      function init() {
        particles = [];
        for (let i = 0; i < 80; i++) particles.push(new Particle());
      }
      function draw() {
        ctx.clearRect(0, 0, W, H);
        /* Gradient background */
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0,   '#e8f4ec');
        grad.addColorStop(0.5, '#f0f4f0');
        grad.addColorStop(1,   '#e4f0e8');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        /* Particles */
        particles.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = W;
          if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H;
          if (p.y > H) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.alpha;
          ctx.fill();
        });
        /* Connection lines */
        ctx.globalAlpha = 1;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = 'rgba(45,134,83,' + (1 - dist/100) * 0.15 + ')';
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }
      resize();
      init();
      draw();
      window.addEventListener('resize', () => { resize(); init(); });
    })();
    /* ── Status messages & auto-redirect ── */
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw2JpnKyd3gXzG0qKN11wSxtzBnJO-s600jg12JgmByuNk1pqmJiz_TeAFzw0yn2Qrj/exec';
    const messages = [
      { t: 400,  msg: 'Đang xác thực kết nối…' },
      { t: 900,  msg: 'Đang tải cấu hình hệ thống…' },
      { t: 1500, msg: 'Đang chuẩn bị dữ liệu…' },
      { t: 2100, msg: 'Sẵn sàng! Đang chuyển hướng…' },
    ];
    const statusEl = document.getElementById('statusText');
    messages.forEach(m => {
      setTimeout(() => { statusEl.textContent = m.msg; }, m.t);
    });
    /* Redirect after 2.8 s */
    setTimeout(() => { window.location.href = GAS_URL; }, 2800);
  </script>
</body>
</html>
